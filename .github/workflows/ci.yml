name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/ModulithReliabilityKit.sln

      # Local builds disable NuGetAudit (no external feed I/O); the vulnerability check runs here instead.
      # Informational so a newly-published advisory does not retroactively break unrelated PRs.
      - name: Vulnerability scan
        run: dotnet list src/ModulithReliabilityKit.sln package --vulnerable --include-transitive
        continue-on-error: true

      - name: Build
        run: dotnet build src/ModulithReliabilityKit.sln --no-restore -c Release

      # The IntegrationTests project uses Testcontainers; the GitHub-hosted Ubuntu runner ships with a
      # running Docker daemon, so the throwaway PostgreSQL containers start without extra setup.
      - name: Test
        run: dotnet test src/ModulithReliabilityKit.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
