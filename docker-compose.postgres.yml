services:
  postgres:
    image: postgres:16-alpine
    container_name: modulith_reliability_kit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: modulith_reliability_kit
      POSTGRES_USER: modulith_reliability_kit
      POSTGRES_PASSWORD: modulith_reliability_kit
    ports:
      - "5432:5432"
    volumes:
      - modulith_reliability_kit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modulith_reliability_kit -d modulith_reliability_kit"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional durable transport. Only needed when running the API with Messaging:Transport=Nats;
  # the default in-memory transport requires no broker. JetStream is enabled with -js.
  nats:
    image: nats:2.10-alpine
    container_name: modulith_reliability_kit-nats
    restart: unless-stopped
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  modulith_reliability_kit_pgdata:
