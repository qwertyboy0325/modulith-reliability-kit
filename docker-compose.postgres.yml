services:
  postgres:
    image: postgres:16-alpine
    container_name: modulith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: modulith
      POSTGRES_USER: modulith
      POSTGRES_PASSWORD: modulith
    ports:
      - "5432:5432"
    volumes:
      - modulith_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modulith -d modulith"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  modulith_pgdata:
